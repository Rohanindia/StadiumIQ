<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StadiumIQ — GenAI-powered Smart Stadium & Tournament Operations for FIFA World Cup 2026. Real-time crowd management, fan navigation, accessibility routing, and AI assistance." />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:title" content="StadiumIQ — FIFA World Cup 2026" />
    <meta property="og:description" content="GenAI-powered Smart Stadium Operations Platform" />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>StadiumIQ — FIFA World Cup 2026</title>
  </head>
  <body>
    <script>
      (function() {
        function logToBody(type, args) {
          const div = document.createElement('div');
          div.style.color = type === 'error' ? 'red' : 'orange';
          div.style.padding = '10px 20px';
          div.style.fontFamily = 'monospace';
          div.style.whiteSpace = 'pre-wrap';
          div.style.zIndex = '99999';
          div.style.position = 'relative';
          div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
          div.innerHTML = '<h1>CONSOLE ' + type.toUpperCase() + ':</h1>' + Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
          document.body.appendChild(div);
        }

        const orgError = console.error;
        console.error = function() {
          logToBody('error', arguments);
          orgError.apply(console, arguments);
        };

        const orgWarn = console.warn;
        console.warn = function() {
          logToBody('warning', arguments);
          orgWarn.apply(console, arguments);
        };

        window.onerror = function(message, source, lineno, colno, error) {
          logToBody('uncaught error', [message, 'at', source + ':' + lineno + ':' + colno, error && error.stack]);
        };
        window.onunhandledrejection = function(event) {
          logToBody('unhandled rejection', [event.reason, event.reason && event.reason.stack]);
        };
      })();
    </script>

    <!-- Skip to main content — first element for keyboard/screen reader users -->
    <a
      href="#main-content"
      class="skip-to-content"
      style="
        position: absolute;
        top: -40px;
        left: 0;
        background: #1D9E75;
        color: white;
        padding: 8px 16px;
        text-decoration: none;
        font-weight: 600;
        z-index: 9999;
        border-radius: 0 0 8px 0;
        transition: top 0.2s;
      "
      onfocus="this.style.top='0'"
      onblur="this.style.top='-40px'"
    >
      Skip to main content
    </a>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed — app still works online
          });
        });
      }
    </script>
  </body>
</html>
