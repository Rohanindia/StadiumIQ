<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StadiumIQ — GenAI-powered Smart Stadium & Tournament Operations for FIFA World Cup 2026. Real-time crowd management, fan navigation, accessibility routing, and AI assistance." />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:title" content="StadiumIQ — FIFA World Cup 2026" />
    <meta property="og:description" content="GenAI-powered Smart Stadium Operations Platform" />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>StadiumIQ — FIFA World Cup 2026</title>
  </head>
  <body>

    <!-- Skip to main content — first element for keyboard/screen reader users -->
    <a
      href="#main-content"
      class="skip-to-content"
      style="
        position: absolute;
        top: -40px;
        left: 0;
        background: #1D9E75;
        color: white;
        padding: 8px 16px;
        text-decoration: none;
        font-weight: 600;
        z-index: 9999;
        border-radius: 0 0 8px 0;
        transition: top 0.2s;
      "
      onfocus="this.style.top='0'"
      onblur="this.style.top='-40px'"
    >
      Skip to main content
    </a>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed — app still works online
          });
        });
      }
    </script>
  </body>
</html>
